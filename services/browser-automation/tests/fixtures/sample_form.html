<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sample Job Application Form</title>
  </head>
  <body>
    <h1>Job Application</h1>
    <form id="application-form">
      <div>
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="Jane Doe" />
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" />
      </div>
      <div>
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 555 000 0000" />
      </div>
      <div>
        <label for="location">Location</label>
        <input type="text" id="location" name="location" placeholder="City, Country" />
      </div>
      <div>
        <label for="summary">Cover Letter / Summary</label>
        <textarea id="summary" name="summary" rows="5" placeholder="Tell us about yourself…"></textarea>
      </div>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
