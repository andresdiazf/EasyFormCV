services:
  - type: web
    name: easyformcv-api
    runtime: node
    rootDir: .
    buildCommand: npm install && cd apps/api && npm run build
    startCommand: cd apps/api && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false